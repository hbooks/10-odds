name: MK-806 Script Runner

on:
  workflow_dispatch:
    inputs:
      script:
        description: 'Script to run'
        required: true
        type: choice
        options:
          - main_pipeline     # fetch_and_store_data.py
          - update_results    # update_results.py
          - update_patterns   # update_patterns.py
          - cleanup_odds      # cleanup_odds.py

# Prevent concurrent runs of the same script to avoid duplicate DB writes.
# A new dispatch for the same script will wait for the current one to finish.
concurrency:
  group: mk806-${{ inputs.script }}
  cancel-in-progress: false

jobs:
  run-script:
    name: Run ${{ inputs.script }}
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      # ── Main Pipeline (fetch_and_store_data.py) ────────────────────────
      - name: Run Main Pipeline
        if: inputs.script == 'main_pipeline'
        env:
          SUPABASE_URL:          ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY:  ${{ secrets.SUPABASE_SERVICE_KEY }}
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
          ODDS_API_KEY:          ${{ secrets.ODDS_API_KEY }}
        run: python backend/fetch_and_store_data.py

      # ── Result Updater (update_results.py) ────────────────────────────
      - name: Run Result Updater
        if: inputs.script == 'update_results'
        env:
          SUPABASE_URL:             ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY:     ${{ secrets.SUPABASE_SERVICE_KEY }}
          FOOTBALL_DATA_API_KEY:    ${{ secrets.FOOTBALL_DATA_API_KEY_H }}
          FOOTBALL_DATA_API_KEY_H:  ${{ secrets.FOOTBALL_DATA_API_KEY_H }}
        run: python backend/update_results.py

      # ── Pattern Updater (update_patterns.py) ──────────────────────────
      - name: Run Pattern Updater
        if: inputs.script == 'update_patterns'
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python backend/update_patterns.py

      # ── Odds Cleanup (cleanup_odds.py) ────────────────────────────────
      - name: Run Odds Cleanup
        if: inputs.script == 'cleanup_odds'
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python backend/cleanup_odds.py

      # ── Completion summary ────────────────────────────────────────────
      - name: Log completion
        if: always()
        run: |
          echo "Script: ${{ inputs.script }}"
          echo "Result: ${{ job.status }}"
          echo "Finished at: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"