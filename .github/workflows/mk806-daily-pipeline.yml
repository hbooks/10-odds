name: MK-806 Daily Pipeline

on:
  schedule:
    # Main Pipeline – 6:00 AM Kenya (3:00 AM UTC)
    - cron: '0 3 * * *'
    # Result Updater – 4:00 AM Kenya (1:00 AM UTC)
    - cron: '0 1 * * *'
    # Pattern Updater – 6:30 AM Kenya (3:30 AM UTC)
    - cron: '30 3 * * *'
  workflow_dispatch:

jobs:
  run-main-pipeline:
    name: MK-806 Main Pipeline
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 3 * * *' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
      - name: Run MK-806 Pipeline
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: |
          cd backend
          python fetch_and_store_data.py

  run-result-updater:
    name: Result Updater
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 1 * * *' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
      - name: Run Result Updater
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          FOOTBALL_DATA_API_KEY_H: ${{ secrets.FOOTBALL_DATA_API_KEY_H }}
        run: |
          cd backend
          python update_results.py

  run-pattern-updater:
    name: Pattern Analyzer
    runs-on: ubuntu-latest
    if: github.event.schedule == '30 3 * * *' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
      - name: Run Pattern Updater
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          cd backend
          python update_patterns.py